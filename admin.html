<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin · Code Share Academy</title>
  <meta name="color-scheme" content="dark" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Public+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <header class="nav">
    <div class="wrap nav-in">
      <a class="brand" href="/">
        <span class="dots" aria-hidden="true"><i></i><i></i><i></i></span>
        <span class="brand-name">CODE&nbsp;SHARE&nbsp;ACADEMY</span>
        <span class="brand-path">/ admin.py</span>
      </a>
      <div class="nav-right">
        <span class="status" id="queue-meta" hidden><span class="pulse" aria-hidden="true"></span> <span id="queue-meta-text">reviewing</span></span>
        <button class="act-scholar" id="logout-btn" hidden>log out</button>
      </div>
    </div>
  </header>

  <main>

    <!-- ───────── login ───────── -->
    <section id="login-view">
      <form class="editor login-panel" id="login-form" novalidate>
        <div class="editor-bar">
          <span class="dots small" aria-hidden="true"><i></i><i></i><i></i></span>
          <span class="tab">auth.sh <span class="x" aria-hidden="true">×</span></span>
          <span class="editor-meta">~/admin&nbsp;›&nbsp; UTF-8</span>
        </div>
        <div class="editor-body">
          <label for="pw"># passphrase</label>
          <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••••••" />
          <p class="login-err" id="login-err">access denied</p>
          <div class="submit-row" style="padding:18px 0 0">
            <button class="submit" type="submit" id="login-btn">authenticate →</button>
          </div>
        </div>
        <div class="statusbar" aria-hidden="true">
          <span class="sb-left"><span class="sb-dot" id="auth-dot"></span><span id="auth-state">locked</span></span>
          <span class="sb-right">instructors only</span>
        </div>
      </form>
    </section>

    <!-- ───────── review board ───────── -->
    <section id="board-view" hidden>
      <div class="stack" id="stack"><!-- cards injected by admin.js --></div>

      <div id="empty-state" hidden>
        <div class="empty-tick">✓</div>
        <p class="empty-h">Queue clear</p>
        <p class="empty-s">Every application has a decision. New ones will appear here.</p>
        <button class="act-btn" id="reload-btn">Reload</button>
      </div>

      <div id="card-actions">
        <button class="act-btn act-decline" data-dir="left" title="Decline (←)">← Decline</button>
        <button class="act-btn act-waitlist" data-dir="down" title="Waitlist (↓)">↓ Waitlist</button>
        <button class="act-btn act-admit" data-dir="right" title="Admit (→)">Admit →</button>
        <span class="act-sep" aria-hidden="true"></span>
        <button class="act-scholar" id="scholar-toggle" title="Flag scholarship">★ scholarship</button>
        <button class="act-btn" id="open-profile">Full profile</button>
        <button class="act-btn" id="email-btn">✉ Email</button>
      </div>
    </section>
  </main>

  <!-- ───────── card template ───────── -->
  <template id="card-tpl">
    <article class="swipe-card editor">
      <div class="editor-bar">
        <span class="dots small" aria-hidden="true"><i></i><i></i><i></i></span>
        <span class="tab"><span data-tab>applicant</span>.json <span class="x" aria-hidden="true">×</span></span>
        <span class="editor-meta" data-loc></span>
      </div>
      <div class="card-body">
        <div class="card-name" data-name></div>
        <div class="card-row">
          <span class="card-grade" data-grade></span>
          <span class="exp-badge" data-exp></span>
          <span class="schol-badge" data-schol hidden>★ scholarship</span>
        </div>
        <p class="card-ai" data-ai></p>
        <div class="card-idea" data-idea></div>
      </div>
      <span class="verdict admit" aria-hidden="true">ADMIT</span>
      <span class="verdict decline" aria-hidden="true">DECLINE</span>
      <span class="verdict waitlist" aria-hidden="true">WAITLIST</span>
      <div class="statusbar" aria-hidden="true">
        <span class="sb-left"><span class="sb-dot"></span><span class="ok-t" data-state>pending</span><span class="sep">·</span><span>swipe / arrow keys</span></span>
        <span class="sb-right" data-count></span>
      </div>
    </article>
  </template>

  <!-- ───────── full-profile drawer ───────── -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <aside class="drawer editor" id="drawer" role="dialog" aria-modal="true" aria-label="Applicant profile" aria-hidden="true">
    <div class="editor-bar">
      <span class="dots small" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="tab"><span id="drawer-name">applicant</span>.json <span class="x" aria-hidden="true">×</span></span>
      <button class="drawer-close" id="drawer-close" aria-label="Close">×</button>
    </div>
    <div class="drawer-scroll" id="drawer-body"><!-- fields injected --></div>
  </aside>

  <!-- ───────── email composer ───────── -->
  <div class="composer-overlay" id="composer-overlay">
    <form class="editor composer" id="composer" role="dialog" aria-modal="true" aria-label="Compose email" novalidate>
      <div class="editor-bar">
        <span class="dots small" aria-hidden="true"><i></i><i></i><i></i></span>
        <span class="tab">email.eml <span class="x" aria-hidden="true">×</span></span>
        <button class="drawer-close" id="composer-close" type="button" aria-label="Close">×</button>
      </div>
      <div class="editor-body">
        <div class="compose-meta" id="compose-to"></div>
        <label for="tmpl-select"># template</label>
        <select id="tmpl-select">
          <option value="admit">Admit — pay $225 via Zelle</option>
          <option value="scholarship">Scholarship — full ride</option>
          <option value="waitlist">Waitlist</option>
          <option value="decline">Decline</option>
        </select>
        <label for="compose-from"># from</label>
        <select id="compose-from"></select>
        <label for="compose-subject"># subject</label>
        <input id="compose-subject" type="text" />
        <label for="compose-body"># body</label>
        <textarea id="compose-body"></textarea>
        <p class="compose-status" id="compose-status"></p>
        <div class="submit-row" style="padding:16px 0 0">
          <button class="submit" type="submit" id="compose-send">Send email →</button>
        </div>
      </div>
    </form>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
