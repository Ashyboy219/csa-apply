<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin · Code Share Academy</title>
  <meta name="color-scheme" content="dark" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Public+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <header class="nav">
    <div class="wrap nav-in">
      <a class="brand" href="/">
        <span class="dots" aria-hidden="true"><i></i><i></i><i></i></span>
        <span class="brand-name">CODE&nbsp;SHARE&nbsp;ACADEMY</span>
        <span class="brand-path">/ admin.py</span>
      </a>
      <div class="nav-right">
        <button class="ghost-btn" id="connect-gmail" hidden>✉ Connect Gmail</button>
        <span class="who" id="whoami" hidden></span>
        <button class="ghost-btn" id="logout-btn" hidden>log out</button>
      </div>
    </div>
  </header>

  <main>

    <!-- ───────── login ───────── -->
    <section id="login-view">
      <form class="editor login-panel" id="login-form" novalidate>
        <div class="editor-bar">
          <span class="dots small" aria-hidden="true"><i></i><i></i><i></i></span>
          <span class="tab">auth.sh <span class="x" aria-hidden="true">×</span></span>
          <span class="editor-meta">~/admin&nbsp;›&nbsp; UTF-8</span>
        </div>
        <div class="editor-body">
          <label for="login-name"># your name <span class="hint">(so we know who reviewed)</span></label>
          <input id="login-name" type="text" autocomplete="name" placeholder="first name" />
          <label for="pw" style="margin-top:16px"># passphrase</label>
          <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••" />
          <p class="login-err" id="login-err">access denied</p>
          <div class="submit-row" style="padding:18px 0 0">
            <button class="submit" type="submit" id="login-btn">authenticate →</button>
          </div>
        </div>
        <div class="statusbar" aria-hidden="true">
          <span class="sb-left"><span class="sb-dot" id="auth-dot"></span><span id="auth-state">locked</span></span>
          <span class="sb-right">instructors only</span>
        </div>
      </form>
    </section>

    <!-- ───────── review board ───────── -->
    <section id="board-view" hidden>

      <div class="pile-bar" id="pile-bar" role="tablist" aria-label="Application piles">
        <button class="pile pile-pending is-active" data-pile="applied" role="tab" aria-selected="true">
          <span class="pile-k">Pending</span><span class="pile-n" data-pile-n="applied">0</span>
        </button>
        <button class="pile pile-admit" data-pile="enrolled" role="tab" aria-selected="false">
          <span class="pile-k">Admitted</span><span class="pile-n" data-pile-n="enrolled">0</span>
        </button>
        <button class="pile pile-wait" data-pile="waitlist" role="tab" aria-selected="false">
          <span class="pile-k">Waitlist</span><span class="pile-n" data-pile-n="waitlist">0</span>
        </button>
        <button class="pile pile-decline" data-pile="declined" role="tab" aria-selected="false">
          <span class="pile-k">Declined</span><span class="pile-n" data-pile-n="declined">0</span>
        </button>
      </div>

      <div class="board-grid">
        <!-- left: the swipe stack + actions -->
        <div class="board-left">
          <div class="stack" id="stack"><!-- cards injected by admin.js --></div>

          <div id="empty-state" hidden>
            <div class="empty-tick" id="empty-tick">✓</div>
            <p class="empty-h" id="empty-h">Pile clear</p>
            <p class="empty-s" id="empty-s">Nothing left to review here.</p>
            <button class="act-btn" id="reload-btn">Reload</button>
          </div>

          <div id="card-actions">
            <button class="act-btn act-decline" data-dir="left" title="Decline (←)">← Decline</button>
            <button class="act-btn act-waitlist" data-dir="down" title="Waitlist (↓)">↓ Waitlist</button>
            <button class="act-btn act-admit" data-dir="right" title="Admit (→)">Admit →</button>
            <button class="act-scholar" id="scholar-toggle" title="Flag scholarship">★ scholarship</button>
          </div>
          <p class="board-hint">drag or use <kbd>←</kbd> <kbd>↓</kbd> <kbd>→</kbd> · pick a pile above to revisit decisions</p>
        </div>

        <!-- right: the always-on full profile of the front applicant -->
        <aside class="profile-pane editor" id="profile-pane" aria-label="Applicant profile">
          <div class="editor-bar">
            <span class="dots small" aria-hidden="true"><i></i><i></i><i></i></span>
            <span class="tab"><span id="profile-tab">profile</span>.json <span class="x" aria-hidden="true">×</span></span>
            <span class="editor-meta" id="profile-loc"></span>
          </div>
          <div class="profile-scroll" id="profile-scroll">
            <p class="profile-empty" id="profile-empty">No applicants in this pile.</p>
            <div id="profile-content" hidden></div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <!-- ───────── card template ───────── -->
  <template id="card-tpl">
    <article class="swipe-card editor">
      <div class="editor-bar">
        <span class="dots small" aria-hidden="true"><i></i><i></i><i></i></span>
        <span class="tab"><span data-tab>applicant</span>.json <span class="x" aria-hidden="true">×</span></span>
        <span class="verdict-pill" data-verdict-pill>· · ·</span>
      </div>
      <div class="card-body">
        <div class="card-name" data-name></div>
        <div class="card-row">
          <span class="card-grade" data-grade></span>
          <span class="exp-badge" data-exp></span>
          <span class="schol-badge" data-schol hidden>★ scholarship</span>
        </div>
        <p class="card-ai" data-ai></p>
        <div class="card-idea" data-idea></div>
      </div>
      <span class="verdict admit" aria-hidden="true">ADMIT</span>
      <span class="verdict decline" aria-hidden="true">DECLINE</span>
      <span class="verdict waitlist" aria-hidden="true">WAITLIST</span>
      <div class="statusbar" aria-hidden="true">
        <span class="sb-left"><span class="sb-dot"></span><span class="ok-t" data-state>pending</span></span>
        <span class="sb-right" data-count></span>
      </div>
    </article>
  </template>

  <div id="toast" class="toast" role="status" hidden></div>

  <script type="module" src="admin.js"></script>
</body>
</html>
